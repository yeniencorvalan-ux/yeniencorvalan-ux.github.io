<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yenien Corvalán</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
overflow:hidden;
background:black;
}

/* CONTENEDOR */

.slider{

display:flex;

width:100vw;
height:100vh;

overflow-x:scroll;
scroll-snap-type:x mandatory;

}

/* SLIDE */

.slide{

min-width:100vw;
height:100vh;

scroll-snap-align:center;

position:relative;

display:flex;
justify-content:center;
align-items:center;

}

/* imagen fondo */

.slide img{

position:absolute;

width:100%;
height:100%;

object-fit:cover;

}

/* overlay */

.overlay{

position:absolute;
inset:0;
background:rgba(0,0,0,0.35);

}

/* contenido */

.content{

position:relative;
z-index:2;
text-align:center;
color:white;

}

.logo{

width:180px;
margin-bottom:20px;

}

.title{

font-size:22px;

}

/* UI fija */

.fixedUI{

position:fixed;

bottom:30px;
left:0;
right:0;

display:flex;
justify-content:center;
gap:25px;

z-index:999;

}

/* botón */

.contact{

border:1px solid #f4c542;
padding:12px 22px;

color:#f4c542;
text-decoration:none;

}

/* instagram */

.insta{

color:#f4c542;
text-decoration:none;

}

</style>

</head>

<body>


<div class="slider">


<!-- PORTADA -->

<section class="slide">

<img src="foto.jpg">

<div class="overlay"></div>

<div class="content">

<img src="logo.png" class="logo">

<div class="title">
Yenien Corvalán
</div>

</div>

</section>


<!-- PROYECTO 1 -->

<section class="slide">

<img src="proyecto1.jpg">

<div class="overlay"></div>

<div class="content">

<div class="title">
Proyecto 1
</div>

</div>

</section>


<!-- PROYECTO 2 -->

<section class="slide">

<img src="proyecto2.jpg">

<div class="overlay"></div>

<div class="content">

<div class="title">
Proyecto 2
</div>

</div>

</section>


</div>


<!-- BOTON FIJO -->

<div class="fixedUI">

<a
class="contact"
href="https://wa.me/549XXXXXXXXXX"
target="_blank">
INICIAR PROYECTO
</a>


<a
class="insta"
href="https://instagram.com/yenysumundo"
target="_blank">
@yenysumundo
</a>

</div>


</body>
</html>
