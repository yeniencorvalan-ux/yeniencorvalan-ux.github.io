<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yenien Corvalán</title>

<style>

/* ======================
   RESET
====================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:url("foto.jpg") center/cover no-repeat fixed;
color:#f4c542;
}

/* overlay sutil */
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.25);
z-index:0;
}

/* contenedor principal */
.container{
position:relative;
z-index:1;

min-height:100vh;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

padding:40px 20px;
}

/* logo */

.logo{
width:180px;
margin-bottom:30px;
}

/* textos */

.bio{
text-align:center;
font-size:15px;
line-height:1.5;
margin-bottom:25px;
max-width:300px;
}

.link{
margin:8px 0;
text-decoration:underline;
cursor:pointer;
}

/* proyectos */

.projects{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
width:100%;
max-width:340px;
margin:30px 0;
}

.project img{
width:100%;
border-radius:4px;
transition:0.3s;
}

.project img:hover{
transform:scale(1.04);
}

/* botón */

.contact{
margin-top:20px;

border:1px solid #f4c542;
color:#f4c542;

padding:14px 26px;

text-decoration:none;

display:inline-block;

transition:0.3s;
}

.contact:hover{
background:#f4c542;
color:black;
}

/* footer */

.footer{
margin-top:40px;
font-size:12px;
letter-spacing:4px;
opacity:0.7;
}


/* ======================
   DESKTOP
====================== */

@media(min-width:900px){

.logo{
width:240px;
}

.projects{
grid-template-columns:repeat(4, 1fr);
max-width:700px;
}

.bio{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="bio">
Diseñador gráfico autodidacta.<br>
Exploro identidad, imagen y emoción.
</div>

<a href="https://youtube.com/@yeniencq" target="_blank" class="link">
romantizo escenas comunes
</a>

<a href="https://youtube.com/watch?v=Bv6BqbV-kiU" target="_blank" class="link">
escuchá mi canción
</a>


<div class="projects">

<a href="proyecto1.jpg" class="project">
<img src="proyecto1.jpg">
</a>

<a href="proyecto2.jpg" class="project">
<img src="proyecto2.jpg">
</a>

<a href="proyecto3.jpg" class="project">
<img src="proyecto3.jpg">
</a>

<a href="proyecto4.jpg" class="project">
<img src="proyecto4.jpg">
</a>

</div>


<a
class="contact"
href="https://wa.me/5492995814618?text=Hola%20Yenien,%20quiero%20iniciar%20un%20proyecto"
target="_blank">
INICIAR PROYECTO
</a>


<div class="footer">
YENIEN CORVALÁN
</div>

</div>

</body>
</html>
