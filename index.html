<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yen — Diseñador gráfico</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:black;
color:white;
overflow:hidden;
}

/* CONTENEDOR PRINCIPAL */

.container{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

/* CADA DIAPOSITIVA */

.slide{
height:100vh;
width:100%;
position:relative;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
}

/* IMAGEN DE FONDO */

.slide img.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* DEGRADE ESTILO APP */

.overlay{
position:absolute;
bottom:0;
width:100%;
height:60%;
background:linear-gradient(
to top,
rgba(0,0,0,0.95),
rgba(0,0,0,0.6),
rgba(0,0,0,0)
);
z-index:1;
}

/* CONTENIDO */

.content{
position:relative;
z-index:2;
width:85%;
max-width:500px;
}

/* LOGO */

.logo{
width:120px;
margin-bottom:20px;
}

/* TEXTO */

h1{
font-size:32px;
font-weight:800;
margin-bottom:10px;
}

p{
opacity:0.8;
}

/* BOTON FIJO GLOBAL */

.cta{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#ff4d00;
padding:16px 28px;
border-radius:50px;
font-weight:600;
z-index:999;
display:flex;
gap:15px;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.cta span{
opacity:0.7;
font-weight:400;
}

/* BOTON SIGUIENTE */

.next{
position:absolute;
bottom:100px;
left:50%;
transform:translateX(-50%);
opacity:0.7;
font-size:14px;
}

</style>

</head>
<body>

<div class="container">

<!-- PORTADA -->

<section class="slide">

<img src="foto.jpg" class="bg">

<div class="overlay"></div>

<div class="content">

<img src="logo.png" class="logo">

<h1>Yen</h1>

<p>Diseñador gráfico autodidacta</p>

</div>

<div class="next">deslizar ↓</div>

</section>


<!-- PROYECTO 1 -->

<section class="slide">

<img src="proyecto1.jpg" class="bg">

<div class="overlay"></div>

<div class="content">

<h1>Proyecto 01</h1>

<p>Identidad visual</p>

</div>

</section>


<!-- PROYECTO 2 -->

<section class="slide">

<img src="proyecto2.jpg" class="bg">

<div class="overlay"></div>

<div class="content">

<h1>Proyecto 02</h1>

<p>Diseño editorial</p>

</div>

</section>


</div>


<!-- BOTON GLOBAL -->

<div class="cta">

Iniciar proyecto

<span>@yenysumundo</span>

</div>


</body>
</html>
